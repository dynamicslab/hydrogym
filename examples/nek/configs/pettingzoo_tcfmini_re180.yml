#!/usr/bin/env python3
# -*- coding: utf-8 -*-
# PettingZoo reproducible config for TCFmini_3D_Re180
# Intended to be used with prepare_workspace + mpirun from work_dir.

runner:
  # RL/interaction settings
  nb_interactions: 2500
  nb_episodes: 20
  nb_warmup_episodes: 1
  train_steps: 300
  gradient_steps: 64
  ckpt_int: 5
  RL_algorithm: "TD3"
  rescale_actions: true
  learning_rate: 1e-3
  batch_size: 256
  buffer_size: 1000000
  learning_starts: 100
  tau: 0.005
  policy_delay: 2
  target_policy_noise: 0.0
  target_noise_clip: 0.0
  action_noise: 0.1

  # Reproducibility and environment coupling
  seed: 1998
  random_init: 6
  rank: 1
  evaluation: false
  normalize_input: "utau"
  ctrl_min_amp: -0.06388353
  ctrl_max_amp: 0.06388353
  npl_state: 2
  u_tau: 0.0638
  dUdy: 12.4271

simulation:
  CASENAME: "phill"
  solver_version: "v19"
  exeName: "nek5000"
  host: "localhost"
  hostfile: ""
  compile_path: "."
  restart_folder: "restart_files"

  # Core runtime configuration
  nproc: 10
  TOTCTRL: 220
  ndrl: 1
  znmf_avg: 0
  target_cfl: 2.0
  y_sensing: 15.0
  retau: 180.0
  ys_bdf: 20.0
  amp_bdf: 5.0
  ret_bdf: 207.0

  # SIZE (mesh)
  lx1: 6
  Lx: 2.67
  Ly: 1.0
  Lz: 0.8
  Nx: 4
  Ny: 16
  Nz: 4
  nxs: 1
  nzs: 1

  # .par settings
  tmax: 100000.0
  stopAt: "numSteps"
  numSteps: 500000
  dt: -0.01
  timeStepper: "bdf3"
  variableDt: "no"
  writeControl: "timeStep"
  writeInterval: 100000
  dealiasing: "yes"
  filtering: "none"
  filterWeight: 0.01
  filterCutoffRatio: 0.9
  stressFormulation: "no"
  variableProperties: "no"
  p_residualTol: 1.0e-08
  p_residualProj: "no"
  v_residualTol: 1.0e-08
  v_residualProj: "no"
  density: 1.0
  viscosity: -2800
  advection: "yes"

  # Runtime parameters
  PARFWRITE: "no"
  PARFNAME: "outparfile"
  LOGLEVEL: 1
  WALLTIME: "23:45"
  READCHKPT: "yes"
  CHKPFNUMBER: 1
  CHKPINTERVAL: 10000000
  AVSTEP: 10
  IOSTEP: 300000000
  SMPSTEP: 23
